name: Check Appointment

on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Check appointment
        id: check
        run: bash check.sh

      - name: Notify
        if: false  # Telegram bot disabled
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUMMARY: ${{ steps.check.outputs.summary }}
        run: |
          curl -sf "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
            --data-urlencode "chat_id=$CHAT_ID" \
            --data-urlencode "text=$SUMMARY"

      - name: Notify on failure
        if: false  # Telegram bot disabled
        continue-on-error: true
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -sf "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
            --data-urlencode "chat_id=$CHAT_ID" \
            --data-urlencode "text=⚠️ Appointment checker failed — $RUN_URL"
